<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>المصرية الإماراتية — منصة التجارة الدولية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            /* استخراج درجات الأزرق من كود شركتك الأصلي */
            --primary-color: #0d47a1; 
            --primary-color-light: #1976d2;
            --accent-color: #e3f2fd; 
            --background-color: #f8f9fa; 
            --surface-color: #ffffff;
            --text-color: #212529; 
            --heading-color: #0d47a1;
            --radius-lg: 16px;
        }

        body {
            font-family: "Cairo", sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.7;
        }

        /* Header */
        header {
            background: linear-gradient(90deg, #1976d2, #0d47a1);
            padding: 1rem 5%;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .translate-container a {
            text-decoration: none;
            color: #fff;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .translate-container a:hover {
            background: #fff;
            color: var(--primary-color);
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(13, 71, 161, 0.9), rgba(13, 71, 161, 0.8)), 
                        url('https://images.unsplash.com/photo-1529070538774-1843cb3265df?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            color: white;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .hero p {
            opacity: 0.9;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Main Container */
        .main-container {
            max-width: 1000px;
            margin: -30px auto 40px;
            padding: 20px;
            background: var(--surface-color);
            border-radius: var(--radius-lg);
            box-shadow: 0 15px 35px rgba(13, 71, 161, 0.1);
        }

        .form-frame {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #eee;
        }

        iframe {
            width: 100%;
            display: block;
        }

        footer {
            background: #020617;
            color: #fff;
            text-align: center;
            padding: 30px;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; text-align: center; }
            .hero h1 { font-size: 1.6rem; }
            .main-container { width: 95%; margin-top: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-ship"></i>
            <span>المصرية الإماراتية للتوكيلات التجارية</span>
        </div>
        <div class="translate-container">
            <a href="">
                <i class="fas fa-globe"></i> English Version
            </a>
        </div>
    </header>

    <section class="hero">
        <h1>AL MASRIYA AL EMARATIYA</h1>
        <p>للشركة المصرية الإماراتية للتوكيلات التجارية والاستيراد والتصدير - حلول لوجستية متكاملة</p>
    </section>

    <div class="main-container">
        <div class="form-frame">
            <iframe 
                src="https://docs.google.com/forms/d/e/1FAIpQLSeHLD9ggpW1RG8a8E5NqJfFg8AycnbrQaKtP1HuqKOQVtimwA/viewform?embedded=true" 
                width="100%" 
                height="3760" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0">
                جاري التحميل...
            </iframe>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Al Masriya Al Emaratia. All Rights Reserved.</p>
        <p style="opacity: 0.5; font-size: 0.8rem; margin-top: 5px;">IMPORT & EXPORT - COMMERCIAL AGENCIES</p>
    </footer>

</body>
</html>
