<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | EGY UAE</title>
    <!-- الرجوع خطوة للخلف للوصول للملفات الأساسية -->
    
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden; }
        .video-bg video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.2); }
    </style>
</head>
<body>
    <div class="video-bg">
        <video autoplay muted loop playsinline><source src="sky_background.mp4" type="video/mp4"></video>
    </div>

    <div class="dash-container">
        <aside class="sidebar">
            <div class="logo"><h2>EGY UAE</h2></div>
            <nav style="margin-top: 50px; display: flex; flex-direction: column; gap: 20px;">
                <a href="#" style="color: var(--primary);"><i class="fas fa-home"></i> Overview</a>
                <a href="#"><i class="fas fa-ship"></i> Shipments</a>
                <a href="#"><i class="fas fa-file-pdf"></i> Documents</a>
                <a href="../portal.html" style="margin-top: 100px; color: #ff4d4d;"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px;">
                <h1>National ID: <span style="color: var(--primary);">30604041304577</span></h1>
                <div class="status-badge">Active Account</div>
            </header>

            <div class="stat-grid">
                <div class="card">
                    <i class="fas fa-box" style="font-size: 2rem; color: var(--primary);"></i>
                    <h3>Total Shipments</h3>
                    <p style="font-size: 2rem; font-weight: 900;">12</p>
                </div>
                <div class="card">
                    <i class="fas fa-truck-loading" style="font-size: 2rem; color: var(--secondary);"></i>
                    <h3>In Customs</h3>
                    <p style="font-size: 2rem; font-weight: 900;">2</p>
                </div>
                <div class="card">
                    <i class="fas fa-check-circle" style="font-size: 2rem; color: #00ff88;"></i>
                    <h3>Delivered</h3>
                    <p style="font-size: 2rem; font-weight: 900;">10</p>
                </div>
            </div>

            <div class="card" style="background: rgba(255,255,255,0.02);">
                <h3>Live Tracking</h3>
                <table style="width: 100%; margin-top: 20px; border-collapse: collapse;">
                    <thead>
                        <tr style="text-align: left; color: var(--primary); border-bottom: 1px solid var(--border-color);">
                            <th style="padding: 15px;">AWB Number</th>
                            <th>Origin</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr style="border-bottom: 1px solid var(--border-color);">
                            <td style="padding: 15px;">#AME-99082</td>
                            <td>Jebel Ali, UAE</td>
                            <td><span class="status-badge">On Customs</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
