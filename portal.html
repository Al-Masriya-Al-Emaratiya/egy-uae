<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AL MASRIYA AL EMARATIYA</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css"> <!-- ربط ملفك الأصلي -->
</head>
<body class="no-scroll">
    <!-- الخلفية المتحركة من ملفك -->
    <div class="animated-lines-container" id="lines-container"></div>
    <div class="overlay-gradient"></div>

    <div class="hero">
        <div class="contact-form-container" style="max-width: 450px;">
            <div class="logo"><h2>AME</h2></div>
            <h2 style="font-size: 2rem; margin-bottom: 10px;">Client Portal</h2>
            <p style="margin-bottom: 30px;">Login to access your trade dashboard</p>
            
            <form id="login-form" class="contact-form">
                <input type="text" id="username" placeholder="Username / Client ID" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Access Dashboard</button>
                <p id="error-message" style="color: #ff4d4d; display: none; margin-top: 15px; font-size: 0.9rem;">Invalid Credentials!</p>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // كود الخطوط المتحركة من ملفك الأصلي
        const container = document.getElementById('lines-container');
        for (let i = 0; i < 15; i++) {
            const line = document.createElement('div');
            line.className = 'animated-line';
            line.style.top = Math.random() * 100 + 'vh';
            line.style.animationDuration = (Math.random() * 10 + 10) + 's';
            line.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(line);
        }
    </script>
</body>
</html>
