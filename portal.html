<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL MASRIYA AL EMARATIYA | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* كود خاص بالفيديو كخلفية */
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; overflow: hidden;
        }
        .video-bg video {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.4) contrast(1.1); /* تغميق الفيديو لظهور الكلام */
        }
        .hero { background: transparent !important; } /* إزالة أي خلفية تعارض الفيديو */
    </style>
</head>
<body class="no-scroll">
   <audio id="SKY" loop>
       <source src="sky_background.mp3">
   </audio>
    <div class="video-bg">
        <video autoplay muted loop playsinline id="myVideo">
            <source src="sky_background.mp4" type="video/mp4">
        </video>
    </div>

    <div class="overlay-gradient"></div>

    <div class="hero">
        <div class="contact-form-container" style="max-width: 450px; background: rgba(7, 9, 15, 0.7); backdrop-filter: blur(15px);">
            <div class="logo"><h2>EGY UAE</h2></div>
            <h2 style="font-size: 1.8rem; margin-bottom: 5px;">Client Access</h2>
            <p style="margin-bottom: 25px; color: var(--text-medium);">AL MASRIYA AL EMARATIYA Portal</p>
            
            <form id="login-form" class="contact-form">
                <input type="text" id="username" placeholder="Client ID / Username" required>
                <input type="password" id="password" placeholder="Secure Password" required>
                <button type="submit" id="login-btn">Login to Dashboard</button>
                <p id="error-message" style="color: #ff4d4d; display: none; margin-top: 15px; font-weight: bold;">Incorrect Username or Password!</p>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="js/audio.js"></script>
</body>
</html>
