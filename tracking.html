<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Shipment Tracking — Al Masriya Al Emaratia</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --primary: #00d2ff; 
            --secondary: #3a7bd5; 
            --background-dark: #07090f; 
            --text-light: #e0e0e0; 
            --text-medium: #a0a0a0; 
            --text-dark: #606060; 
            --glass-bg: rgba(255, 255, 255, 0.03); 
            --glass-hover-bg: rgba(255, 255, 255, 0.08); 
            --card-shadow: 0 5px 20px rgba(0,0,0,0.4); 
            --card-hover-shadow: 0 15px 40px rgba(0,210,255,0.2); 
            --border-color: rgba(255,255,255,0.08); 
            --input-bg: rgba(255,255,255,0.03);
            --input-border: rgba(255,255,255,0.1);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: radial-gradient(circle at top, #111a2e 0%, var(--background-dark) 80%);
            background-attachment: fixed;
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5 { font-family: 'Cairo', sans-serif; line-height: 1.2; }

        /* --- Header (Glassmorphism) --- */
        header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 1200px; padding: 15px 30px;
            background: var(--glass-bg); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-color); border-radius: 50px;
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; box-shadow: var(--card-shadow);
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area span { 
            font-weight: 900; font-family: 'Cairo'; font-size: 1.2rem;
            background: linear-gradient(to right, var(--text-light), var(--primary)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }
        .lang-btn {
            text-decoration: none; color: var(--text-light); font-weight: 700;
            border: 1px solid var(--border-color); padding: 8px 20px; 
            border-radius: 20px; font-size: 0.9rem; transition: var(--transition);
            background: var(--glass-bg);
        }
        .lang-btn:hover { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 15px rgba(0,210,255,0.3); }

        /* --- Hero Section (3D & Glowing) --- */
        .hero-section {
            padding: 150px 20px 80px; text-align: center; perspective: 1000px;
        }
        .hero-section h2 { 
            font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; margin-bottom: 20px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .search-container {
            max-width: 700px; margin: 0 auto; display: flex; gap: 15px;
            background: var(--glass-bg); padding: 15px; border-radius: 20px;
            border: 1px solid var(--border-color); backdrop-filter: blur(10px);
            box-shadow: var(--card-shadow); transform-style: preserve-3d;
            transition: var(--transition);
        }
        .search-container:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--card-hover-shadow); }
        
        .search-container input {
            flex: 1; padding: 15px 25px; border: 1px solid var(--input-border);
            background: var(--input-bg); border-radius: 12px; color: var(--text-light);
            font-size: 1.1rem; font-family: 'Tajawal', sans-serif; outline: none; transition: var(--transition);
        }
        .search-container input:focus { border-color: var(--primary); box-shadow: inset 0 0 10px rgba(0,210,255,0.2); }
        
        .btn-track {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: #fff; border: none; padding: 0 40px; border-radius: 12px; 
            font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: var(--transition);
            font-family: 'Cairo'; letter-spacing: 1px;
        }
        .btn-track:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,210,255,0.4); }

        /* --- Results Content --- */
        .main-content { width: 90%; max-width: 1200px; margin: 0 auto 80px; perspective: 1000px; }
        #result-section { display: none; animation: popIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; opacity: 0; transform: translateY(50px) scale(0.95); }

        /* --- 3D Data Cards --- */
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-bottom: 40px; transform-style: preserve-3d; }
        .info-card { 
            background: var(--glass-bg); padding: 30px; border-radius: 20px; 
            border: 1px solid var(--border-color); backdrop-filter: blur(10px);
            box-shadow: var(--card-shadow); transition: var(--transition);
            text-align: center; position: relative; overflow: hidden;
        }
        .info-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(to right, var(--primary), var(--secondary)); opacity: 0; transition: var(--transition); }
        .info-card:hover { transform: translateY(-10px) rotateX(5deg); background: var(--glass-hover-bg); border-color: rgba(0,210,255,0.3); box-shadow: var(--card-hover-shadow); }
        .info-card:hover::before { opacity: 1; }
        
        .info-card h4 { color: var(--text-medium); margin-bottom: 10px; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }
        .info-card p { font-size: 1.5rem; font-weight: 700; color: var(--text-light); font-family: 'Cairo'; }
        #status { color: var(--primary); text-shadow: 0 0 10px rgba(0,210,255,0.5); }

        /* --- Map Styling (Dark Mode) --- */
        .map-container {
            background: var(--glass-bg); padding: 15px; border-radius: 25px;
            border: 1px solid var(--border-color); box-shadow: var(--card-shadow);
            margin-bottom: 40px; transition: var(--transition);
        }
        .map-container:hover { border-color: var(--primary); box-shadow: var(--card-hover-shadow); }
        #map { height: 450px; border-radius: 15px; z-index: 1; }
        
        .leaflet-layer,
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out,
        .leaflet-control-attribution {
            filter: invert(100%) hue-rotate(180deg) brightness(85%) contrast(90%);
        }

        /* --- 3D Glowing Timeline --- */
        .timeline-card { 
            background: var(--glass-bg); padding: 40px; border-radius: 25px; 
            border: 1px solid var(--border-color); backdrop-filter: blur(10px);
            box-shadow: var(--card-shadow); transition: var(--transition);
        }
        .timeline-card:hover { border-color: var(--border-color); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .timeline-card h3 { color: var(--text-light); margin-bottom: 30px; font-size: 1.8rem; text-align: center; }
        
        .t-item { position: relative; padding-left: 60px; padding-bottom: 40px; transition: var(--transition); }
        .t-item::before {
            content: ''; position: absolute; left: 24px; top: 0; width: 2px; height: 100%;
            background: rgba(255,255,255,0.1); transition: var(--transition);
        }
        .t-item:last-child::before { display: none; }
        
        .t-icon {
            position: absolute; left: 0; top: 0; width: 50px; height: 50px;
            background: var(--background-dark); border: 2px solid var(--border-color); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; z-index: 2;
            color: var(--text-medium); transition: var(--transition); font-size: 1.2rem;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        
        .t-item.completed::before { background: linear-gradient(to bottom, var(--primary), transparent); }
        .t-item.completed .t-icon { border-color: var(--primary); color: var(--primary); text-shadow: 0 0 10px var(--primary); box-shadow: inset 0 0 10px rgba(0,210,255,0.2), 0 0 15px rgba(0,210,255,0.4); }
        .t-item.active .t-icon { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 0 25px rgba(0,210,255,0.6); transform: scale(1.1); }
        
        .t-content { background: var(--glass-bg); padding: 15px 25px; border-radius: 15px; border: 1px solid transparent; transition: var(--transition); }
        .t-item:hover .t-content { background: var(--glass-hover-bg); border-color: rgba(255,255,255,0.1); transform: translateX(10px); }
        .t-content h5 { margin: 0 0 5px; font-size: 1.3rem; color: var(--text-light); }
        .t-content p { margin: 0; font-size: 1rem; color: var(--text-medium); }
        .t-content span { color: var(--primary); font-weight: 700; }

        @keyframes popIn { 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        /* --- Responsive Design --- */
        @media (max-width: 768px) {
            header { width: 95%; padding: 10px 20px; border-radius: 20px; }
            .logo-area span { font-size: 0.9rem; }
            .hero-section { padding-top: 120px; }
            .search-container { flex-direction: column; background: transparent; border: none; box-shadow: none; }
            .search-container input { border-radius: 12px; background: var(--glass-bg); border: 1px solid var(--border-color); }
            .btn-track { padding: 15px; border-radius: 12px; width: 100%; }
            .t-item:hover .t-content { transform: none; }
        }
    </style>
     <audio id="myAudio" loop>
  <source src="sky_background.mp3" type="audio/mpeg">
    </audio>
    <div class="video-container">
        <video autoplay muted loop playsinline id="background-video">
            <source src="sky_background.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="overlay-gradient"></div>
    </div>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="Al_Masriya_Al_Emaratiya_icon.png" height="40" alt="Logo">
            <span>AL MASRIYA AL EMARATIA</span>
        </div>
        <a href="tracking-ar.html" class="lang-btn"><i class="fas fa-globe"></i> العربية</a>
    </header>

    <section class="hero-section">
        <h2>Global Shipment Tracking</h2>
        <div class="search-container">
            <input type="text" id="trackInput" placeholder="Enter Container or B/L Number...">
            <button class="btn-track" onclick="startTracking()"><i class="fas fa-search"></i> TRACK</button>
        </div>
    </section>

    <main class="main-content">
        <div id="result-section">
            <div class="data-grid">
                <div class="info-card">
                    <h4>Vessel Name</h4>
                    <p id="vessel-name"><i class="fas fa-ship"></i> ---</p>
                </div>
                <div class="info-card">
                    <h4>Current Status</h4>
                    <p id="status"><i class="fas fa-satellite-dish"></i> ---</p>
                </div>
                <div class="info-card">
                    <h4>Final Destination</h4>
                    <p id="destination"><i class="fas fa-map-marker-alt"></i> ---</p>
                </div>
            </div>

            <div class="map-container">
                <div id="map"></div>
            </div>

            <div class="timeline-card">
                <h3><i class="fas fa-route" style="color: var(--primary);"></i> Shipment Milestones</h3>
                <div id="timeline-list"></div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;

        async function startTracking() {
            const id = document.getElementById('trackInput').value.trim();
            if(!id) return;

            try {
                const response = await fetch('shipments.json');
                const data = await response.json();
                const ship = data.find(s => s.tracking_id === id);

                if (ship) {
                    document.getElementById('result-section').style.display = 'block';
                    renderData(ship);
                    initMap(ship.current_location);
                    
                    setTimeout(() => {
                        document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                } else {
                    alert("ID not found. Please check and try again.");
                }
            } catch (e) {
                console.error("Fetch error:", e);
                alert("Error fetching data. Ensure 'shipments.json' is available.");
            }
        }

        function renderData(ship) {
            document.getElementById('vessel-name').innerHTML = ship.vessel_name;
            document.getElementById('status').innerHTML = ship.current_status;
            document.getElementById('destination').innerHTML = ship.destination.port;

            const list = document.getElementById('timeline-list');
            list.innerHTML = "";
            ship.milestones.forEach((m, index) => {
                const isLastCompleted = m.completed && (!ship.milestones[index+1] || !ship.milestones[index+1].completed);
                const item = document.createElement('div');
                item.className = `t-item ${m.completed ? 'completed' : ''} ${isLastCompleted ? 'active' : ''}`;
                
                let iconClass = "fa-circle-notch fa-spin";
                if(m.completed) iconClass = "fa-check";
                if(isLastCompleted) iconClass = "fa-anchor";

                item.innerHTML = `
                    <div class="t-icon">
                        <i class="fas ${iconClass}"></i>
                    </div>
                    <div class="t-content">
                        <h5>${m.stage}</h5>
                        <p>${m.location} — <span>${m.date}</span></p>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function initMap(loc) {
            if (map) map.remove();
            map = L.map('map', { zoomControl: true }).setView([loc.lat, loc.lng], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            
            const shipIcon = L.divIcon({
                className: 'ship-marker',
                html: `<div style="
                    background: linear-gradient(135deg, var(--primary), var(--secondary)); 
                    color:white; width:45px; height:45px; border-radius:50%; 
                    display:flex; align-items:center; justify-content:center; 
                    border: 3px solid var(--background-dark); 
                    box-shadow: 0 0 20px var(--primary);
                    font-size: 1.2rem; transform: rotate(-15deg);
                "><i class="fas fa-ship"></i></div>`,
                iconSize: [45, 45],
                iconAnchor: [22, 22]
            });

            L.marker([loc.lat, loc.lng], {icon: shipIcon}).addTo(map)
                .bindPopup(`
                    <div style="background:var(--background-dark); color:white; padding:5px; border-radius:5px; font-family:'Tajawal', sans-serif;">
                        <b style="color:var(--primary);">Current Location:</b><br>${loc.name}
                    </div>
                `).openPopup();
        }
    </script>
</body>
</html>
