<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tracking — Al Masriya Al Emaratia</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            /* الألوان الأصلية للهوية مع لمسات تحسين */
            --primary-dark: #0d47a1;
            --primary-main: #1976d2;
            --accent-gold: #c5a059; /* لمسة كلاسيكية خفيفة للروح */
            --bg-light: #f0f4f8;
            --white: #ffffff;
            --shadow: 0 12px 24px rgba(0, 71, 161, 0.1);
        }

        body { 
            font-family: "Tajawal", sans-serif; 
            background-color: var(--bg-light); 
            margin: 0; padding: 0; 
            color: #333;
        }

        /* --- Header: Modern & Professional --- */
        header { 
            background: var(--white); 
            padding: 12px 0; 
            border-bottom: 3px solid var(--primary-dark);
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .header-container { 
            width: 90%; max-width: 1200px; margin: 0 auto; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .logo-area { display: flex; align-items: center; gap: 15px; font-weight: 800; color: var(--primary-dark); font-size: 1.2rem; }

        /* --- Hero Section: The "Soul" of the Brand --- */
        .hero-section {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-main) 100%);
            padding: 80px 20px;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero-section::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 50px;
            background: var(--bg-light); clip-path: polygon(0 100%, 100% 100%, 100% 0);
        }

        .search-container {
            max-width: 650px; margin: 30px auto 0;
            display: flex; background: var(--white);
            padding: 6px; border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .search-container input {
            flex: 1; border: none; padding: 15px; font-size: 1rem;
            outline: none; font-family: inherit;
        }
        .btn-track {
            background: var(--primary-dark); color: white; border: none;
            padding: 0 30px; border-radius: 8px; cursor: pointer;
            font-weight: 700; transition: 0.3s;
        }
        .btn-track:hover { background: var(--primary-main); }

        /* --- Tracking Content --- */
        .main-content { width: 90%; max-width: 1100px; margin: -40px auto 50px; position: relative; z-index: 5; }
        
        #result-section { display: none; animation: slideIn 0.6s ease-out; }

        .data-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; margin-bottom: 25px; 
        }
        .info-card { 
            background: var(--white); padding: 25px; border-radius: 15px; 
            box-shadow: var(--shadow); border-top: 4px solid var(--primary-main);
        }
        .info-card h4 { color: var(--primary-dark); margin: 0 0 10px 0; font-size: 0.9rem; text-transform: uppercase; opacity: 0.8; }
        .info-card p { margin: 0; font-size: 1.2rem; font-weight: 700; color: #222; }

        /* --- Map Styling --- */
        #map { 
            height: 400px; border-radius: 15px; margin-bottom: 25px; 
            border: 5px solid var(--white); box-shadow: var(--shadow);
        }

        /* --- Classic Timeline --- */
        .timeline-card { background: var(--white); padding: 35px; border-radius: 15px; box-shadow: var(--shadow); }
        .t-item {
            position: relative; padding-left: 45px; padding-bottom: 30px;
        }
        .t-item::before {
            content: ''; position: absolute; left: 16px; top: 0; width: 2px; height: 100%;
            background: #e0e0e0;
        }
        .t-item:last-child::before { height: 20px; }
        .t-icon {
            position: absolute; left: 0; top: 0; width: 34px; height: 34px;
            background: var(--white); border: 2px solid #ddd; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; z-index: 2;
            color: #ccc; font-size: 14px; transition: 0.3s;
        }
        .t-item.completed .t-icon { border-color: var(--primary-main); color: var(--primary-main); }
        .t-item.active .t-icon { background: var(--primary-main); border-color: var(--primary-main); color: white; box-shadow: 0 0 15px rgba(25, 118, 210, 0.4); }
        
        .t-content h5 { margin: 0; font-size: 1.1rem; color: var(--primary-dark); }
        .t-content p { margin: 5px 0 0; font-size: 0.9rem; color: #666; }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            header { padding: 10px 0; }
            .logo-area span { display: none; }
            .hero-section h2 { font-size: 1.5rem; }
            .search-container { flex-direction: column; background: transparent; box-shadow: none; gap: 10px; }
            .search-container input, .btn-track { border-radius: 10px; width: 100%; padding: 15px; box-shadow: var(--shadow); }
            .main-content { margin-top: 20px; }
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo-area">
                <img src="Al_Masriya_Al_Emaratiya_icon.png" height="45" alt="Logo">
                <span>AL MASRIYA AL EMARATIA</span>
            </div>
            <a href="tracking-ar.html" style="color: var(--primary-dark); font-weight: 700; text-decoration: none; border: 2px solid var(--primary-dark); padding: 5px 15px; border-radius: 8px; font-size: 0.9rem;">العربية</a>
        </div>
    </header>

    <section class="hero-section">
        <h2 style="font-weight: 800; margin: 0;">Track Your Global Shipment</h2>
        <p style="opacity: 0.9; margin-top: 10px;">Real-time tracking for containers and B/L</p>
        <div class="search-container">
            <input type="text" id="trackInput" placeholder="Enter Container Number (e.g. AMUE123456)...">
            <button class="btn-track" onclick="startTracking()">TRACK NOW</button>
        </div>
    </section>

    <main class="main-content">
        <div id="result-section">
            <div class="data-grid">
                <div class="info-card">
                    <h4>Vessel Name</h4>
                    <p id="vessel-name">---</p>
                </div>
                <div class="info-card">
                    <h4>Current Status</h4>
                    <p id="status" style="color: var(--primary-main);">---</p>
                </div>
                <div class="info-card">
                    <h4>Final Destination</h4>
                    <p id="destination">---</p>
                </div>
            </div>

            <div id="map"></div>

            <div class="timeline-card">
                <h3 style="margin-top: 0; color: var(--primary-dark); border-bottom: 2px solid #f0f0f0; padding-bottom: 15px;">Shipment Journey</h3>
                <div id="timeline-list" style="margin-top: 25px;"></div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;

        async function startTracking() {
            const id = document.getElementById('trackInput').value.trim();
            if(!id) return;

            // محاكاة جلب البيانات - استبدلها بـ fetch('shipments.json')
            const response = await fetch('shipments.json');
            const data = await response.json();
            const ship = data.find(s => s.tracking_id === id);

            if (ship) {
                document.getElementById('result-section').style.display = 'block';
                renderData(ship);
                initMap(ship.current_location);
                window.scrollTo({ top: 350, behavior: 'smooth' });
            } else {
                alert("Tracking ID not found.");
            }
        }

        function renderData(ship) {
            document.getElementById('vessel-name').innerText = ship.vessel_name;
            document.getElementById('status').innerText = ship.current_status;
            document.getElementById('destination').innerText = ship.destination.port;

            const list = document.getElementById('timeline-list');
            list.innerHTML = "";
            ship.milestones.forEach((m, index) => {
                const isLastCompleted = m.completed && (!ship.milestones[index+1] || !ship.milestones[index+1].completed);
                const item = document.createElement('div');
                item.className = `t-item ${m.completed ? 'completed' : ''} ${isLastCompleted ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="t-icon">
                        <i class="fas ${m.completed ? 'fa-check' : 'fa-anchor'}"></i>
                    </div>
                    <div class="t-content">
                        <h5>${m.stage}</h5>
                        <p>${m.location} — <span style="font-weight:700">${m.date}</span></p>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function initMap(loc) {
            if (map) map.remove();
            map = L.map('map').setView([loc.lat, loc.lng], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            const markerIcon = L.divIcon({
                className: 'custom-marker',
                html: `<i class="fas fa-ship" style="color:var(--primary-dark); font-size:24px; text-shadow: 0 0 10px white;"></i>`,
                iconSize: [30, 30]
            });

            L.marker([loc.lat, loc.lng], {icon: markerIcon}).addTo(map)
                .bindPopup(`<b>${loc.name}</b><br>Current Position`).openPopup();
        }
    </script>
</body>
</html>
