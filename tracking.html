<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tracking — Al Masriya Al Emaratia</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* نفس الـ CSS السابق مع تعديل الاتجاهات */
        :root {
            --primary-color: #0d47a1; --primary-color-light: #1976d2;
            --background-color: #f8f9fa; --surface-color: #ffffff;
            --text-color: #212529; --heading-color: #0d47a1;
            --border-color: #dee2e6; --radius-lg: 16px;
        }

        body { font-family: "Tajawal", sans-serif; background-color: var(--background-color); color: var(--text-color); margin: 0; padding-top: 80px; }
        header { background: linear-gradient(90deg, #1976d2, #0d47a1); padding: 0.7rem 0; color: #fff; position: fixed; top: 0; width: 100%; z-index: 1000; }
        .container { width: 90%; max-width: 1000px; margin: 0 auto; }
        
        .search-hero { background: var(--surface-color); padding: 40px; border-radius: var(--radius-lg); box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; margin-bottom: 30px; }
        .search-box { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; }
        input { flex: 1; padding: 15px; border: 2px solid var(--border-color); border-radius: 12px; }
        .btn-search { background: var(--primary-color); color: #fff; border: none; padding: 0 30px; border-radius: 12px; cursor: pointer; font-weight: 700; }

        #result-section { display: none; animation: fadeIn 0.5s ease; }
        #map { height: 400px; width: 100%; border-radius: var(--radius-lg); margin-bottom: 30px; }
        
        .shipment-details { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .detail-card { background: var(--surface-color); padding: 25px; border-radius: var(--radius-lg); border-left: 5px solid var(--primary-color); }
        
        .timeline { list-style: none; background: var(--surface-color); padding: 30px; border-radius: var(--radius-lg); }
        .t-item { position: relative; padding-left: 40px; margin-bottom: 25px; border-left: 2px solid #eee; }
        .t-item::after { content: '\f0d1'; font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; left: -12px; top: 0; background: #fff; color: #ddd; border: 2px solid #eee; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .t-item.completed { border-left-color: var(--primary-color); }
        .t-item.completed::after { color: #fff; background: var(--primary-color); border-color: var(--primary-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <div style="font-weight: 700; display: flex; align-items: center; gap: 10px;">
                <img src="Al_Masriya_Al_Emaratiya_icon.png" height="40"> Al Masriya Al Emaratia
            </div>
            <a href="tracking-ar.html" style="color: #fff; font-size: 0.9rem; font-weight: 600; border: 1px solid #fff; padding: 5px 15px; border-radius: 8px;">العربية</a>
        </div>
    </header>

    <main class="container">
        <section class="search-hero">
            <h2>Track Your Cargo Worldwide</h2>
            <div class="search-box">
                <input type="text" id="trackInput" placeholder="Enter Container or B/L Number...">
                <button class="btn-search" onclick="startTracking()">Track</button>
            </div>
        </section>

        <div id="result-section">
            <div id="map"></div>
            
            <div class="shipment-details">
                <div class="detail-card">
                    <h4 style="color: var(--primary-color)">Shipment Info</h4>
                    <p>Vessel: <strong id="vessel-name">---</strong></p>
                    <p>Status: <strong id="status">---</strong></p>
                </div>
                <div class="detail-card">
                    <h4 style="color: var(--primary-color)">Schedules</h4>
                    <p>Origin: <strong id="origin">---</strong></p>
                    <p>ETA: <strong id="eta">---</strong></p>
                </div>
            </div>

            <div class="timeline" id="timeline-list"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        async function startTracking() {
            const id = document.getElementById('trackInput').value;
            const response = await fetch('shipments.json'); // ملف الإنجليزية
            const data = await response.json();
            const ship = data.find(s => s.tracking_id === id);

            if (ship) {
                document.getElementById('result-section').style.display = 'block';
                renderData(ship);
                initMap(ship.current_location);
            } else { alert("ID not found."); }
        }

        function renderData(ship) {
            document.getElementById('vessel-name').innerText = ship.vessel_name;
            document.getElementById('status').innerText = ship.current_status;
            document.getElementById('origin').innerText = ship.origin.port;
            document.getElementById('eta').innerText = ship.destination.estimated_arrival;

            const list = document.getElementById('timeline-list');
            list.innerHTML = "";
            ship.milestones.forEach(m => {
                const item = document.createElement('div');
                item.className = `t-item ${m.completed ? 'completed' : ''}`;
                item.innerHTML = `<strong>${m.stage}</strong><br><small>${m.location} | ${m.date}</small>`;
                list.appendChild(item);
            });
        }

        function initMap(loc) {
            if (map) map.remove();
            map = L.map('map').setView([loc.lat, loc.lng], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker([loc.lat, loc.lng]).addTo(map).bindPopup(loc.name).openPopup();
        }
    </script>
</body>
</html>
